<!DOCTYPE html>
<html>

<body>
    <h2 style="text-align: center;"> KNUTSFORD UNIVERSITY</h2>
    <h2 style="text-align: center;"> STUDENT LECTURE ATTENDANCE SHEET (WINTER 2026)</h2>
    <hr>
    <form method="post">
        <Label>Course Title <input type="text" name="course" /></Label>
        <br /><br />
        <Label>Course CODE <input type="text" name="code" /></Label>
        <br />
        <br />

        <Label>Level <select>
                <option>100</option>
                <option>200</option>
                <option>300</option>
                <option>400</option>

            </select></Label>
        <br />
        <br />
        <Label>Lecture Session

            <input type="radio" value="Regular" name="session">Regular</input>
            <input type="radio" value="Evening" name="session">Evening</input>
            <input type="radio" value="Weekend" name="session">Weekend`</input>

        </Label>
        <br />
        <br />

        <Label>Course Rep <input type="text" name="rep" /></Label><br /><br />
        <Label>Date <input type="date" name="date" /></Label><br /><br />
        <Label>Start time <input type="time" name="starttime" /></Label><br /><br />
        <Label>End Time <input type="time" name="endtime" /></Label><br /><br />
        <input type="submit" value="submit">

    </form>

</body>

</html>
